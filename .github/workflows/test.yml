name: test
on:
  push
jobs:
  automated-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@main

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@main
    
      - run: |
          #sudo apt update
          #sudo apt install tor
          #sudo systemctl start tor --now
          #sudo systemctl enable tor --now
          #while ! yt-dlp --proxy socks5://127.0.0.1:9050/ -f 18 NSIC3QVGzNE _ZNOLgM_518 mjqwTY9zjq4 5cq7y-OYxCY wrLJxZQUZqA ; do curl -s --socks5 127.0.0.1:9050 http://httpbin.org/ip ; sudo systemctl restart tor --now ; sleep 5s ; done && echo "Success!"
          CONFIG_PAYLOAD="vmess://ca80451e-768a-469f-9913-57a27268fd70@199.247.30.45:8080?type=ws&path=/&packetEncoding=xudp#%F0%9F%87%B3%F0%9F%87%B1NL-199.247.30.45-8361"
          wget -qO xray https://github.com/XTLS/Xray-core/releases/download/v1.8.0/Xray-linux-64.tar.gz && tar -zxvf Xray-linux-64.tar.gz && sudo mv Xray /usr/local/bin/xray && chmod +x /usr/local/bin/xray && nohup echo "$CONFIG_PAYLOAD" | /usr/local/bin/xray -c - &
          yt-dlp --proxy socks5://127.0.0.1:10808/ -f 18 NSIC3QVGzNE _ZNOLgM_518 mjqwTY9zjq4 5cq7y-OYxCY wrLJxZQUZqA

      - name: git stuff
        run: |
          git config --local user.email "action[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "$(od -An -tx4 -w16 -N16 /dev/urandom | cut -c2- | tr '[:lower:]' '[:upper:]')"
          git push
